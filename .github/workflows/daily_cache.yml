name: MLB Cache Refresh

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  refresh-cache:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas pybaseball requests pyarrow

      - name: Run cache fetcher
        env:
          MLB_CACHE_DIR: /tmp/mlb_cache
        run: python scripts/fetch_cache.py

      - name: Copy cache to repo
        run: |
          mkdir -p cache/daily cache/weekly
          cp /tmp/mlb_cache/daily/*.parquet  cache/daily/  2>/dev/null || true
          cp /tmp/mlb_cache/weekly/*.parquet cache/weekly/ 2>/dev/null || true
          ls -lh cache/weekly/ || true

      - name: Commit cache files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cache/
          git diff --staged --quiet || git commit -m "cache: refresh $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
